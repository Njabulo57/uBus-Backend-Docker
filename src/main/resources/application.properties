spring.application.name=UBUS
server.port=8050


# ============================
# thread
# ============================
spring.threads.virtual.enabled=true


# ==================================
# POSTGRESQL DATABASE CONFIGURATION
# ==================================
spring.datasource.url=jdbc:postgresql://localhost:5432/Ubus
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



# ==================================
# JPA / HIBERNATE SETTINGS
# ==================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Show SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ==================================
# CONNECTION POOL (Hikari)
# ==================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000


# ===========================
# Jwt Settings
# ===========================
jwt.secret=${JWT_SECRET}
jwt.duration=${JWT_DURATION}


# ==================
# Email Settings
# ==================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ubusujofficial@gmail.com
spring.mail.password=pkll xerh uefb prss

# SMTP Authentication & TLS
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Timeout Settings
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000


# =================
# opt duration
# =================
OTP_DURATION_MINUTES=10
otp.durationDurationMinutes=${OTP_DURATION_MINUTES}
otp.length=${OTP_LENGTH}

otp.admin.length=12
otp.admin.durationDurationMinutes=20

otp.numeric=${OTP_NUMERIC}
otp.alphabets=${OTP_ALPHABETS}



# =========================
# Spring Security Settings
# =========================
logging.level.org.springframework.security=TRACE