<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Driver · uBus</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="./shared/app.css" />
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="brand-dot"></span> uBus · Driver</div>
  <span id="route-label" class="chip">—</span>
  <div class="spacer"></div>
  <span id="status" class="pill disconnected"><span class="dot"></span><span class="txt">Disconnected</span></span>
</div>

<div id="map"></div>

<div class="panel panel-driver">
  <h2>Trip Controls</h2>
  <label class="field">Active trip</label>
  <select id="trip-select">
    <option value="">Loading trips...</option>
  </select>

  <div style="height:10px"></div>

  <label class="field">Speed (km/h)</label>
  <input id="speed" type="number" value="35" min="0" max="120" />

  <div style="height:12px"></div>

  <div class="row">
    <button id="btn-start">▶ Start driving</button>
    <button id="btn-pause" class="secondary" disabled>⏸ Pause</button>
  </div>
  <div style="height:8px"></div>
  <button id="btn-end" class="danger" style="width:100%">⏹ End trip</button>

  <div class="readout">
    <div><span class="k">trip:</span> <span id="r-trip" class="v">—</span></div>
    <div><span class="k">lat:</span>  <span id="r-lat" class="v">—</span></div>
    <div><span class="k">lng:</span>  <span id="r-lng" class="v">—</span></div>
    <div><span class="k">speed:</span><span id="r-speed" class="v">—</span></div>
    <div><span class="k">sent:</span> <span id="r-sent" class="v">0</span> frames</div>
    <div><span class="k">last:</span> <span id="r-last" class="v">—</span></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script src="./shared/sa-routes.js"></script>
<script src="./shared/stomp-client.js"></script>
<script src="./shared/bus-icon.js"></script>
<script>
const WS_URL = "http://localhost:8050/web-socket";

const map = L.map("map", { zoomControl: true }).setView([-29.5, 24.5], 6);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png", {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 19,
}).addTo(map);

// State
let currentTrip = null;
let currentRoute = null;
let polyline = null;
let busMarker = null;
let segIndex = 0;
let segT = 0;
let driving = false;
let timer = null;
let sent = 0;

// DOM Elements
const statusEl = document.getElementById("status");
const tripSelect = document.getElementById("trip-select");
const routeLabel = document.getElementById("route-label");
const btnStart = document.getElementById("btn-start");
const btnPause = document.getElementById("btn-pause");
const btnEnd = document.getElementById("btn-end");

function setStatus(s) {
  statusEl.className = "pill " + s;
  statusEl.querySelector(".txt").textContent =
    s === "connected" ? "Connected" : s === "connecting" ? "Connecting…" : "Disconnected";
}

// TODO: YOU IMPLEMENT THIS ENDPOINT
async function loadActiveTrips() {
  try {
    const response = await fetch('http://localhost:8050/trips/get-active-trip');
    const trips = await response.json();
    
    tripSelect.innerHTML = '<option value="">-- Select a trip --</option>';
    
    trips.forEach(trip => {
      const opt = document.createElement('option');
      opt.value = trip.id;
      opt.textContent = `${trip.route} - ${trip.busName || trip.busId}`;
      tripSelect.appendChild(opt);
    });
    
    if (trips.length === 0) {
      tripSelect.innerHTML = '<option value="">-- No active trips --</option>';
    }
  } catch (error) {
    console.error('Failed to load trips:', error);
    tripSelect.innerHTML = '<option value="">-- Error loading trips --</option>';
  }
}

// Match trip route to SA_ROUTES for map display
function getRouteGeometry(routeName) {
  const matched = SA_ROUTES.find(r => 
    r.label.toLowerCase().includes(routeName.toLowerCase())
  );
  return matched || SA_ROUTES[0];
}

function updateMapForRoute(route) {
  if (!route) return;
  
  if (polyline) map.removeLayer(polyline);
  polyline = L.polyline(route.points, { color: route.color, weight: 4, opacity: 0.7 }).addTo(map);
  map.fitBounds(polyline.getBounds().pad(0.3));
  
  if (busMarker) map.removeLayer(busMarker);
  busMarker = L.marker(route.points[0], {
    icon: makeBusIcon(route.color, "🚌"),
  }).addTo(map);
  
  segIndex = 0;
  segT = 0;
}

function interpolate() {
  if (!currentRoute || !currentRoute.points) return [0, 0];
  
  const pts = currentRoute.points;
  if (segIndex >= pts.length - 1) {
    return pts[pts.length - 1];
  }
  
  const a = pts[segIndex];
  const b = pts[segIndex + 1];
  const lat = a[0] + (b[0] - a[0]) * segT;
  const lng = a[1] + (b[1] - a[1]) * segT;
  
  segT += 0.25;
  if (segT >= 1) {
    segIndex++;
    segT = 0;
  }
  
  return [lat, lng];
}

function toLocalDateTime() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const seconds = String(now.getSeconds()).padStart(2, '0');
  return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`;
}

function smoothMove(marker, newPos) {
  if (!marker) return;
  marker.setLatLng(newPos);
}

function tick() {
  if (!currentRoute || !currentTrip) return;
  
  const [lat, lng] = interpolate();
  const speed = +document.getElementById("speed").value || 0;
  const timePosted = toLocalDateTime();
  
  const payload = {
    tripId: currentTrip.id,
    latitude: lat,
    longitude: lng,
    speed: speed,
    timePosted: timePosted
  };
  
  if (window.stompClient && window.stompClient.connected) {
    window.stompClient.publish("/app/buses/get-location", JSON.stringify(payload));
    sent++;
    
    document.getElementById("r-lat").textContent = lat.toFixed(5);
    document.getElementById("r-lng").textContent = lng.toFixed(5);
    document.getElementById("r-speed").textContent = speed + " km/h";
    document.getElementById("r-sent").textContent = sent;
    document.getElementById("r-last").textContent = timePosted.split("T")[1];
    
    smoothMove(busMarker, [lat, lng]);
  }
}

// Trip selection
tripSelect.addEventListener("change", async (e) => {
  const tripId = e.target.value;
  if (!tripId) {
    currentTrip = null;
    currentRoute = null;
    return;
  }
  
  // Find trip from loaded trips or fetch details
  const response = await fetch(`http://localhost:8050/trips/get-trip/${tripId}`);
  currentTrip = await response.json();
  
  routeLabel.textContent = currentTrip.route;
  document.getElementById("r-trip").textContent = currentTrip.id.slice(0, 8) + "…";
  
  currentRoute = getRouteGeometry(currentTrip.route);
  updateMapForRoute(currentRoute);
});

// Controls
btnStart.addEventListener("click", () => {
  if (!currentTrip) {
    alert("Please select a trip first");
    return;
  }
  if (driving) return;
  
  driving = true;
  btnStart.disabled = true;
  btnPause.disabled = false;
  
  tick();
  timer = setInterval(tick, 2000);
});

btnPause.addEventListener("click", () => {
  driving = false;
  clearInterval(timer);
  timer = null;
  btnStart.disabled = false;
  btnPause.disabled = true;
});

btnEnd.addEventListener("click", () => {
  if (timer) clearInterval(timer);
  driving = false;
  btnStart.disabled = false;
  btnPause.disabled = true;
  
  if (window.stompClient && window.stompClient.connected && currentTrip) {
    window.stompClient.publish("/app/buses/end-trip", JSON.stringify({
      tripId: currentTrip.id
    }));
  }
  
  sent = 0;
  document.getElementById("r-sent").textContent = "0";
  segIndex = 0;
  segT = 0;
  
  if (busMarker && currentRoute) {
    busMarker.setLatLng(currentRoute.points[0]);
  }
  
  // Reload trips after ending
  setTimeout(loadActiveTrips, 1000);
});

// Initialize
loadActiveTrips();

// Expose stompClient globally for the shared script
window.stompClient = createBusClient({ 
  url: WS_URL, 
  onStatus: setStatus 
});
</script>
</body>
</html>
